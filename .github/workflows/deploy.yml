name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time — GitHub's canonical setup. Do NOT cancel in-progress:
# cancelling a run mid-deploy leaves the Pages deployment stuck "in progress", which then
# 400s every following run ("due to in progress deployment"). Queue instead so each deploy
# finishes cleanly; for a static site the small wait is harmless.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build (sanity check)
        run: npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          node-version: 22 # match the test job; Node 20 is being deprecated

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Custom domain (cf. public/CNAME) — the github.io page_url 404s, so point at the real site.
      url: https://www.ludiven-studio.fr
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4